<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkiVaro – Skandinavias Vannskimarked</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --black:#0a0c0e;--dark:#111418;--dark2:#181d23;--dark3:#1f252d;
  --border:rgba(255,255,255,0.08);--white:#fff;--off:#b0bac6;
  --accent:#00aaff;--accent2:#0077cc;--red:#cc3333;--green:#1a7a45;
}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--black);color:var(--white);min-height:100vh;overflow-x:hidden}
.page{display:none}.page.active{display:block}
button{cursor:pointer;font-family:'DM Sans',sans-serif}
input,select,textarea{font-family:'DM Sans',sans-serif}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:0 3rem;height:72px;background:linear-gradient(to bottom,rgba(10,12,14,.97),rgba(10,12,14,0));transition:background .3s}
nav.scrolled{background:rgba(10,12,14,.98)!important;border-bottom:1px solid var(--border)}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.9rem;letter-spacing:.12em;color:var(--white);cursor:pointer}
.logo span{color:var(--accent)}
.nav-center{display:flex;gap:2.2rem;list-style:none}
.nav-center a{color:var(--off);text-decoration:none;font-size:.85rem;font-weight:500;letter-spacing:.06em;text-transform:uppercase;transition:color .2s;cursor:pointer}
.nav-center a:hover{color:var(--white)}
.nav-right{display:flex;gap:.8rem;align-items:center}
.btn-ghost{background:transparent;border:1px solid rgba(255,255,255,.3);color:var(--white);padding:.45rem 1.1rem;border-radius:3px;font-size:.82rem;font-weight:500;transition:all .2s}
.btn-ghost:hover{border-color:var(--white)}
.btn-solid{background:var(--accent);border:none;color:var(--white);padding:.45rem 1.2rem;border-radius:3px;font-size:.82rem;font-weight:600;transition:background .2s}
.btn-solid:hover{background:var(--accent2)}
.user-pill{background:var(--dark3);border:1px solid var(--border);color:var(--white);padding:.4rem 1rem;border-radius:3px;font-size:.82rem;display:flex;align-items:center;gap:.5rem;cursor:default}
.user-dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
.msg-btn{background:none;border:1px solid var(--border);color:var(--off);padding:.4rem .8rem;border-radius:3px;font-size:.82rem;display:flex;align-items:center;gap:.4rem;transition:all .2s;position:relative}
.msg-btn:hover{color:var(--white);border-color:var(--white)}
.msg-badge{background:var(--red);color:white;font-size:.6rem;font-weight:700;min-width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;padding:0 3px;position:absolute;top:-6px;right:-6px}

/* HERO */
.hero{position:relative;height:100vh;min-height:600px;display:flex;flex-direction:column;justify-content:flex-end;padding:0 3rem 5rem;overflow:hidden}
.hero-media{position:absolute;inset:0;z-index:0;background:radial-gradient(ellipse at 60% 40%,#0a2a45,#0a0c0e)}
.hero-video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.hero-overlay{position:absolute;inset:0;z-index:2;background:linear-gradient(to top,rgba(10,12,14,1) 0%,rgba(10,12,14,.5) 40%,rgba(10,12,14,.2) 100%)}
.hero-waves{position:absolute;bottom:0;left:0;right:0;height:300px;overflow:hidden;opacity:.1;z-index:2}
.wave{position:absolute;left:-50%;width:200%;height:100%;border-radius:50%}
.wave1{background:var(--accent);top:60%;animation:wave 8s ease-in-out infinite}
.wave2{background:var(--accent2);top:70%;animation:wave 10s ease-in-out infinite reverse;opacity:.7}
.wave3{background:#004488;top:80%;animation:wave 12s ease-in-out infinite;opacity:.5}
@keyframes wave{0%,100%{transform:rotate(0)}50%{transform:rotate(2deg) translateY(-10px)}}
.hero-content{position:relative;z-index:3}
.hero-eyebrow{font-size:.78rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);margin-bottom:1rem;display:flex;align-items:center;gap:.8rem}
.hero-eyebrow::before{content:'';display:block;width:30px;height:1px;background:var(--accent)}
.hero h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(3rem,8vw,7rem);letter-spacing:.04em;line-height:.95;color:var(--white);max-width:800px;margin-bottom:1.5rem}
.hero h1 em{color:var(--accent);font-style:normal}
.hero-sub{color:var(--off);font-size:1.05rem;max-width:460px;line-height:1.6;margin-bottom:2.5rem;font-weight:300}
.hero-btns{display:flex;gap:1rem;flex-wrap:wrap}
.btn-hp{background:var(--accent);color:var(--white);border:none;padding:.9rem 2.2rem;font-size:.9rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;border-radius:3px;transition:background .2s}
.btn-hp:hover{background:var(--accent2)}
.btn-hg{background:transparent;color:var(--white);border:1px solid rgba(255,255,255,.4);padding:.9rem 2.2rem;font-size:.9rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;border-radius:3px;transition:all .2s}
.btn-hg:hover{border-color:var(--white)}
.hero-stats{position:absolute;bottom:4rem;right:3rem;z-index:3;display:flex;flex-direction:column;gap:1.5rem;text-align:right}
.h-stat-num{font-family:'Bebas Neue',sans-serif;font-size:2.4rem;color:var(--white);letter-spacing:.05em;line-height:1}
.h-stat-label{font-size:.7rem;color:var(--off);text-transform:uppercase;letter-spacing:.12em}
.scroll-hint{position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);z-index:3;display:flex;flex-direction:column;align-items:center;gap:.4rem;color:var(--off);font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;animation:bounce 2s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(6px)}}

/* MEDIA STRIPE */
.media-stripe{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;height:240px;background:var(--border)}
.media-slot{overflow:hidden;position:relative;cursor:pointer}
.media-slot img{width:100%;height:100%;object-fit:cover;transition:transform .4s}
.media-slot:hover img{transform:scale(1.05)}
.media-slot-label{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.8));padding:.8rem .8rem .5rem;font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;color:var(--white);font-weight:600}

/* SECTIONS */
.cat-section{background:var(--dark);padding:5rem 3rem}
.section-label{font-size:.72rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);margin-bottom:.8rem;display:flex;align-items:center;gap:.8rem}
.section-label::before{content:'';display:block;width:24px;height:1px;background:var(--accent)}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(2rem,4vw,3.2rem);letter-spacing:.04em;margin-bottom:3rem}
.section-title span{color:var(--accent)}
.cat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:6px;overflow:hidden}
.cat-card{background:var(--dark2);padding:2.5rem 2rem;display:flex;flex-direction:column;align-items:flex-start;gap:1rem;cursor:pointer;transition:background .25s;border:none;color:var(--white);text-align:left;min-height:200px}
.cat-card:hover,.cat-card.active{background:var(--dark3)}
.cat-card.active{border-bottom:2px solid var(--accent)}
.cat-icon{font-size:2rem}.cat-name{font-family:'Bebas Neue',sans-serif;font-size:1.35rem;letter-spacing:.06em}
.cat-desc{font-size:.8rem;color:var(--off);line-height:1.5}.cat-arrow{color:var(--accent);font-size:1.1rem;margin-top:auto}

/* LISTINGS */
.listings-section{background:var(--black);padding:5rem 3rem}
.filter-bar{display:flex;gap:1rem;align-items:center;flex-wrap:wrap;margin-bottom:2.5rem;padding-bottom:1.5rem;border-bottom:1px solid var(--border)}
.filter-select{background:var(--dark2);border:1px solid var(--border);color:var(--white);padding:.55rem 1rem;border-radius:3px;font-size:.82rem;appearance:none;cursor:pointer}
.result-info{color:var(--off);font-size:.85rem;margin-left:auto}
.boats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:1.5px;background:var(--border)}
.boat-card{background:var(--dark2);cursor:pointer;transition:background .2s;overflow:hidden}
.boat-card:hover{background:var(--dark3)}
.card-img{position:relative;height:210px;background:var(--dark3);display:flex;align-items:center;justify-content:center;overflow:hidden}
.card-img img{width:100%;height:100%;object-fit:cover;transition:transform .4s}
.boat-card:hover .card-img img{transform:scale(1.04)}
.card-placeholder{font-size:3rem;opacity:.15}
.card-cat-tag{position:absolute;bottom:10px;left:10px;background:rgba(0,170,255,.9);color:white;font-size:.65rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:.2rem .6rem;border-radius:2px}
.card-country{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.65);border-radius:3px;padding:.2rem .5rem;font-size:.9rem}
.card-body{padding:1.1rem 1.3rem 1.3rem}
.card-brand{font-size:.68rem;color:var(--accent);text-transform:uppercase;letter-spacing:.12em;font-weight:600;margin-bottom:.25rem}
.card-name{font-family:'Bebas Neue',sans-serif;font-size:1.25rem;letter-spacing:.05em;margin-bottom:.4rem}
.card-location{font-size:.75rem;color:var(--off);margin-bottom:.7rem}
.card-price{font-size:1.2rem;font-weight:600;margin-bottom:.7rem}
.card-specs{display:flex;gap:1rem;font-size:.73rem;color:var(--off);padding-top:.7rem;border-top:1px solid var(--border);flex-wrap:wrap}
.empty-state{grid-column:1/-1;text-align:center;padding:6rem 2rem}
.empty-icon{font-size:3rem;margin-bottom:1rem;opacity:.3}
.empty-title{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:.05em;margin-bottom:.5rem}
.empty-sub{color:var(--off);font-size:.88rem;margin-bottom:2rem;line-height:1.6}

/* DETAIL */
.detail-hero{height:52vh;min-height:340px;background:var(--dark2);display:flex;align-items:flex-end;padding:3rem;position:relative;overflow:hidden}
.detail-hero img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.detail-hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(10,12,14,1) 0%,rgba(10,12,14,.2) 60%)}
.detail-hero-content{position:relative;z-index:2}
.detail-brand{font-size:.73rem;color:var(--accent);text-transform:uppercase;letter-spacing:.15em;margin-bottom:.3rem}
.detail-title{font-family:'Bebas Neue',sans-serif;font-size:clamp(1.8rem,4vw,3rem);letter-spacing:.04em}
.detail-body{display:grid;grid-template-columns:1fr 340px;gap:2.5rem;padding:2.5rem;max-width:1150px;margin:0 auto}
.specs-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:4px;overflow:hidden;margin-bottom:1.8rem}
.spec-box{background:var(--dark2);padding:1rem 1.1rem}
.spec-label{font-size:.65rem;color:var(--off);text-transform:uppercase;letter-spacing:.1em;margin-bottom:.25rem}
.spec-val{font-size:.95rem;font-weight:600}
.desc-block h3{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;letter-spacing:.05em;margin-bottom:.7rem}
.desc-block p{font-size:.87rem;color:var(--off);line-height:1.8}
.contact-card{background:var(--dark2);border:1px solid var(--border);border-radius:6px;padding:1.6rem;position:sticky;top:90px}
.contact-card h3{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:.05em;margin-bottom:.3rem}
.contact-price{font-size:1.4rem;font-weight:600;margin-bottom:1.3rem;padding-bottom:.9rem;border-bottom:1px solid var(--border)}
.c-field{margin-bottom:.75rem}
.c-field label{displayNo response
